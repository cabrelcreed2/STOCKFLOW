<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCKFLOW - Connexion</title>
    
    <!-- Bootstrap 5 CSS (local) -->
    <link href="./bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons (local) -->
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/fontawesome-free-6.7.2-web/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .login-card {
            max-width: 450px;
            margin: 0 auto;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header i {
            font-size: 3rem;
            color: #f97316;
        }
        
        .login-header h2 {
            color: #f97316;
            font-weight: 800;
        }
        
        .login-header h2 span {
            color: #ea580c;
        }
        
        .card {
            border-radius: 20px;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(249,115,22,0.4);
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
        }
        
        .form-control:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
        }
        
        .input-group-text {
            background: white;
            border-right: none;
            color: #f97316;
        }
        
        .form-control {
            border-left: none;
        }
        
        .form-control:focus + .input-group-text {
            border-color: #f97316;
        }
        
        a {
            color: #f97316;
            transition: all 0.3s;
        }
        
        a:hover {
            color: #ea580c;
        }
        
        .form-check-input:checked {
            background-color: #f97316;
            border-color: #f97316;
        }
        
        .text-primary {
            color: #f97316 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <!-- Carte de connexion -->
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    
                    <!-- En-tête avec logo (icône Font Awesome locale) -->
                    <div class="login-header">
                        <i class="fas fa-chart-line"></i>
                        <h2 class="mt-3 fw-bold">STOCK<span>FLOW</span></h2>
                        <p class="text-muted">Gestion de Stock</p>
                    </div>
                    
                    <!-- Formulaire de connexion -->
                    <form id="loginForm">
                        <!-- Champ Email -->
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold">
                                <i class="fas fa-envelope"></i> Adresse Email
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="email" 
                                    placeholder="exemple@stockflow.com"
                                    required
                                >
                            </div>
                        </div>
                        
                        <!-- Champ Mot de passe -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-lock"></i> Mot de passe
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-shield-alt"></i>
                                </span>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    placeholder="••••••••"
                                    required
                                >
                            </div>
                        </div>
                        
                        <!-- Options supplémentaires -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted" for="rememberMe">
                                    Se souvenir de moi
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none">Mot de passe oublié ?</a>
                        </div>
                        
                        <!-- Bouton de connexion -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                            </button>
                        </div>
                    </form>
                    
                </div>
            </div>
            
            <!-- Pied de page -->
            <p class="text-center text-muted mt-4">
                <small>© 2025 STOCKFLOW. Tous droits réservés.</small>
            </p>
        </div>
    </div>

    <!-- Bootstrap JS (local) -->
    <script src="./bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Gestion de la connexion
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Redirection selon le rôle (simulation)
            if(email === 'admin@stockflow.com' && password === 'admin123') {
                window.location.href = 'admin/tableau_de_bord_admin.html';
            } 
            else if(email === 'gerant@stockflow.com' && password === 'gerant123') {
                window.location.href = 'gestionnaire/tableau-de-bord-gestionnaire.html';
            }
            else if(email === 'magasinier@stockflow.com' && password === 'magasinier123') {
                window.location.href = 'magasinier/tableau-de-bord-magasinier.html';
            }
            else if(email === 'caissier@stockflow.com' && password === 'caissier123') {
                window.location.href = 'caissier/tableau-de-bord-caissier.html';
            }
            else {
                alert('Email ou mot de passe incorrect');
            }
        });
    </script>
</body>
</html>
